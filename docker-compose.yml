services:
  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    container_name: mysql_core
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: data_infrastructure
    ports:
      - "3306:3306"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d:z
      - mysql_data:/var/lib/mysql:z
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: flask_api
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app:z
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: data_infrastructure
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pytest test.py -v && python app.py"

volumes:
  mysql_data:
